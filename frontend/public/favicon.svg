<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente principal -->
    <linearGradient id="gradTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>

    <!-- brilho tipo glass iOS -->
    <linearGradient id="glassHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>

    <!-- sombra suave -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- GRUPO CENTRAL -->
  <g transform="translate(128,128)" filter="url(#shadow)">

    <!-- ===== LAYER 4 ===== -->
    <g opacity="0.25">
      <polygon points="0,70 70,35 0,0 -70,35" fill="#10b981">
        <animateTransform attributeName="transform"
          type="scale"
          values="1;1.12;1"
          dur="4.5s"
          repeatCount="indefinite"/>
        <animate attributeName="opacity"
          values="0.25;0.45;0.25"
          dur="4.5s"
          repeatCount="indefinite"/>
      </polygon>
    </g>

    <!-- ===== LAYER 3 ===== -->
    <g transform="translate(0,-18)" opacity="0.4">
      <polygon points="0,70 70,35 0,0 -70,35" fill="#10b981">
        <animateTransform attributeName="transform"
          type="scale"
          values="1;1.14;1"
          dur="4s"
          begin="0.3s"
          repeatCount="indefinite"/>
        <animate attributeName="opacity"
          values="0.4;0.65;0.4"
          dur="4s"
          begin="0.3s"
          repeatCount="indefinite"/>
      </polygon>
    </g>

    <!-- ===== LAYER 2 ===== -->
    <g transform="translate(0,-36)" opacity="0.65">
      <polygon points="0,70 70,35 0,0 -70,35" fill="#34d399">
        <animateTransform attributeName="transform"
          type="scale"
          values="1;1.16;1"
          dur="3.6s"
          begin="0.6s"
          repeatCount="indefinite"/>
        <animate attributeName="opacity"
          values="0.65;0.9;0.65"
          dur="3.6s"
          begin="0.6s"
          repeatCount="indefinite"/>
      </polygon>
    </g>

    <!-- ===== LAYER 1 ===== -->
    <g transform="translate(0,-54)">
      <!-- base -->
      <polygon points="0,70 70,35 0,0 -70,35" fill="url(#gradTop)" opacity="0.95">
        <animateTransform attributeName="transform"
          type="scale"
          values="1;1.18;1"
          dur="3.2s"
          begin="0.9s"
          repeatCount="indefinite"/>
      </polygon>

      <!-- reflexo glass -->
      <polygon points="0,70 70,35 0,0 -70,35"
        fill="url(#glassHighlight)"
        opacity="0.6">
        <animate attributeName="opacity"
          values="0.6;0.9;0.6"
          dur="3.2s"
          begin="0.9s"
          repeatCount="indefinite"/>
      </polygon>
    </g>

  </g>
</svg>